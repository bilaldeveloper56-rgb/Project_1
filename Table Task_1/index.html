 <input type="Radio" name="Remember">Radio selection 3

 </div>
 <div class="dropdown">

<option value="dropdown">Dropdown 1</option>
<option value="dropdown">Dropdown 2</option>
<option value="dropdown">Dropdown 3</option>
<option value="dropdown">Dropdown 4</option>

</div>

</div>

     </form>
